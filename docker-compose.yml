version: '3.8'

services:
  # === Person 1 Infrastructure ===
  db:
    image: mongo:6-jammy
    container_name: raw_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: raw_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: raw_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # === Person 2 AI Services ===
  neo4j:
    image: neo4j:5
    container_name: raw_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/investigation123
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: raw_milvus_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: raw_milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: raw_milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    restart: unless-stopped

  # === Combined API ===
  api:
    build: .
    container_name: raw_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - minio
      - neo4j
      - milvus
    environment:
      - MONGO_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - NEO4J_URI=bolt://neo4j:7687
      - MILVUS_HOST=milvus
      - FEATHERLESS_API_KEY=rc_b6cb34a0e41abcd2266da87e740d1ec579d172e3412d675051b0bd1b73bac7c1
    restart: unless-stopped

  worker:
    build: .
    container_name: raw_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - minio
      - neo4j
      - milvus
    environment:
      - MONGO_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_URL=minio:9000
      - NEO4J_URI=bolt://neo4j:7687
      - MILVUS_HOST=milvus
      - FEATHERLESS_API_KEY=rc_b6cb34a0e41abcd2266da87e740d1ec579d172e3412d675051b0bd1b73bac7c1
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
  neo4j_data:
